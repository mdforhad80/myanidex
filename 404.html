<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NovaAnime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0b0f;
            color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container { padding: 2rem; }
        h1 { font-size: 6rem; margin: 0; background: linear-gradient(135deg, #8b5cf6, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-size: 1.5rem; margin: 0.5rem 0 1.5rem; color: #9ca3af; }
        a {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 50px;
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        a:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(217,70,239,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p style="color:#9ca3af;margin-bottom:2rem;">The page you're looking for doesn't exist.</p>
        <a href="index.html">🏠 Return Home</a>
    </div>
</body>
</html>
