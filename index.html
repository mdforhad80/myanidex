<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Stream your favorite anime free - dark themed modern platform">
  <title>AniNexus | Stream Anime Free</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      color: #ededef;
      line-height: 1.5;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1a24;
    }
    ::-webkit-scrollbar-thumb {
      background: #8b5cf6;
      border-radius: 10px;
    }

    /* glassmorphism / gradient accents */
    .purple-glow {
      background: linear-gradient(135deg, #8b5cf6 0%, #c084fc 100%);
    }

    /* navbar */
    .navbar {
      background: rgba(10, 10, 18, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      padding: 0.8rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .logo i {
      color: #c084fc;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      margin-right: 6px;
    }
    .search-box {
      background: #1e1e2a;
      border-radius: 40px;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #2d2d3a;
      transition: 0.2s;
    }
    .search-box:focus-within {
      border-color: #a855f7;
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.4);
    }
    .search-box i {
      color: #a0a0b0;
    }
    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 0.9rem;
      width: 220px;
    }
    @media (max-width: 640px) {
      .navbar { padding: 0.8rem 1rem; flex-direction: column; align-items: stretch; }
      .search-box input { width: 100%; }
    }

    /* main containers */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 2rem;
    }
    .section-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      border-left: 4px solid #a855f7;
      padding-left: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* anime grid */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.8rem;
    }
    .anime-card {
      background: #12121c;
      border-radius: 1.2rem;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s;
      cursor: pointer;
      border: 1px solid #29293a;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .anime-card:hover {
      transform: translateY(-8px);
      border-color: #a855f7;
      box-shadow: 0 20px 30px -10px rgba(168, 85, 247, 0.3);
    }
    .card-img {
      position: relative;
      padding-top: 140%;
      background: #0b0b12;
    }
    .card-img img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }
    .card-content {
      padding: 1rem;
    }
    .card-title {
      font-weight: 700;
      font-size: 1.05rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      margin-top: 8px;
      color: #aaaac0;
    }
    .badge {
      background: #8b5cf620;
      color: #c084fc;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    /* detail section */
    .detail-section {
      background: #0c0c14;
      border-radius: 2rem;
      padding: 1.5rem;
    }
    .detail-backdrop {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .detail-poster {
      flex: 0 0 220px;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }
    .detail-poster img {
      width: 100%;
      display: block;
    }
    .detail-info {
      flex: 1;
    }
    .detail-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .detail-jp {
      color: #a0a0b5;
      margin-bottom: 1rem;
    }
    .genres {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1rem 0;
    }
    .genre-tag {
      background: #2a2a38;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    .synopsis {
      margin: 1rem 0;
      line-height: 1.6;
      color: #d1d1e0;
    }
    .player-container {
      margin: 2rem 0;
      background: #000000;
      border-radius: 1.2rem;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      border: 1px solid #2d2d40;
    }
    .player-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .episode-list {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }
    .episode-btn {
      background: #1f1f2c;
      border: none;
      color: #e2e2f0;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .episode-btn.active, .episode-btn:hover {
      background: #a855f7;
      color: white;
      box-shadow: 0 2px 10px #a855f7;
    }
    .back-home {
      background: transparent;
      border: 1px solid #a855f7;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: #c084fc;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: 0.2s;
    }
    .back-home:hover {
      background: #a855f7;
      color: white;
    }
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #1f1f2c;
      color: #6a6a7e;
      font-size: 0.85rem;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: #c084fc;
    }
    .error-msg {
      background: #2c1a2e;
      padding: 1rem;
      border-radius: 1rem;
      text-align: center;
      color: #f0a3b0;
    }
    .featured-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #a855f7;
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: bold;
      z-index: 2;
    }
    @media (max-width: 700px) {
      .container { padding: 1rem; }
      .anime-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo" id="logoBtn">
    <i class="fas fa-play-circle"></i> AniNexus
  </div>
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search anime...">
  </div>
</nav>

<main>
  <!-- HOME SECTION -->
  <div id="homeSection" class="container">
    <div class="section-title">
      <i class="fas fa-fire-flame" style="color:#c084fc"></i> 
      <span>Discover Anime</span>
    </div>
    <div id="featuredContainer" style="margin-bottom: 2rem;"></div>
    <div id="animeGridContainer" class="anime-grid"></div>
  </div>

  <!-- DETAIL SECTION (hidden initially) -->
  <div id="detailSection" class="container" style="display: none;">
    <button class="back-home" id="backHomeBtn"><i class="fas fa-arrow-left"></i> Back to Home</button>
    <div id="dynamicDetail" class="detail-section"></div>
  </div>
</main>

<footer>
  <p>AniNexus — free anime streaming. All rights belong to respective owners. | Data from local JSON</p>
</footer>

<script>
  // ---------- GLOBALS ----------
  let animeDatabase = [];        // store array of anime objects
  let currentAnimeId = null;
  let currentEpisodeMap = {};    // store embed mapping for current anime
  let currentEpisodesKeys = [];

  // DOM refs
  const homeSection = document.getElementById('homeSection');
  const detailSection = document.getElementById('detailSection');
  const animeGridContainer = document.getElementById('animeGridContainer');
  const featuredContainer = document.getElementById('featuredContainer');
  const dynamicDetail = document.getElementById('dynamicDetail');
  const searchInput = document.getElementById('searchInput');
  const logoBtn = document.getElementById('logoBtn');
  const backHomeBtn = document.getElementById('backHomeBtn');

  // helper: fetch anime.json
  async function fetchAnimeData() {
    try {
      const response = await fetch('data/anime.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      let data = await response.json();
      // support both array and single object
      if (!Array.isArray(data)) {
        data = [data];
      }
      // validate essential fields
      animeDatabase = data.filter(item => item.title && item.id);
      if (animeDatabase.length === 0) throw new Error('no valid anime entries');
      return true;
    } catch (err) {
      console.error(err);
      animeGridContainer.innerHTML = `<div class="error-msg"><i class="fas fa-exclamation-triangle"></i> Failed to load data/anime.json. Make sure file exists and structure is valid. Example array of anime objects.</div>`;
      featuredContainer.innerHTML = '';
      return false;
    }
  }

  // render featured section (first 3 featured = true or fallback)
  function renderFeatured() {
    if (!featuredContainer) return;
    let featuredAnime = animeDatabase.filter(a => a.featured === true);
    if (featuredAnime.length === 0) featuredAnime = animeDatabase.slice(0, 3);
    if (featuredAnime.length === 0) {
      featuredContainer.style.display = 'none';
      return;
    }
    featuredContainer.style.display = 'block';
    featuredContainer.innerHTML = `
      <div class="section-title"><i class="fas fa-crown" style="color:gold"></i> Featured Anime</div>
      <div class="anime-grid" id="featuredGrid"></div>
    `;
    const featuredGrid = document.getElementById('featuredGrid');
    featuredGrid.innerHTML = featuredAnime.map(anime => createCardHTML(anime)).join('');
    // attach click listeners for featured cards
    attachCardEvents(featuredGrid);
  }

  function createCardHTML(anime) {
    const year = anime.year || 'TBA';
    const score = anime.score ? anime.score.toFixed(1) : '?';
    const featuredTag = anime.featured ? `<span class="featured-badge"><i class="fas fa-star"></i> FEATURED</span>` : '';
    return `
      <div class="anime-card" data-id="${anime.id}">
        <div class="card-img">
          ${featuredTag}
          <img src="${anime.image || 'https://via.placeholder.com/300x420?text=No+Image'}" alt="${anime.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x420?text=Poster+Missing'">
        </div>
        <div class="card-content">
          <div class="card-title">${escapeHtml(anime.title)}</div>
          <div class="card-meta">
            <span>${anime.type || 'TV'}</span>
            <span>⭐ ${score}</span>
            <span>${year}</span>
          </div>
        </div>
      </div>
    `;
  }

  // escape html to avoid injection
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  function attachCardEvents(containerElement) {
    if (!containerElement) return;
    const cards = containerElement.querySelectorAll('.anime-card');
    cards.forEach(card => {
      card.removeEventListener('click', cardClickHandler);
      card.addEventListener('click', cardClickHandler);
    });
  }
  function cardClickHandler(e) {
    // find actual card parent
    let targetCard = e.currentTarget;
    const animeId = targetCard.getAttribute('data-id');
    if (animeId) {
      showAnimeDetail(animeId);
    }
  }

  // render home grid with search filter
  function renderHomeGrid(searchTerm = '') {
    if (!animeGridContainer) return;
    let filtered = [...animeDatabase];
    if (searchTerm.trim() !== '') {
      const lowerSearch = searchTerm.trim().toLowerCase();
      filtered = filtered.filter(anime => anime.title.toLowerCase().includes(lowerSearch));
    }
    if (filtered.length === 0) {
      animeGridContainer.innerHTML = `<div class="error-msg" style="grid-column:1/-1">✨ No anime found. Try different keywords.</div>`;
      return;
    }
    animeGridContainer.innerHTML = filtered.map(anime => createCardHTML(anime)).join('');
    attachCardEvents(animeGridContainer);
  }

  // DETAIL VIEW LOGIC (watch + episodes + embed)
  function showAnimeDetail(animeId) {
    const anime = animeDatabase.find(a => a.id === animeId);
    if (!anime) return;
    currentAnimeId = animeId;
    // prepare embed providers + episodes sorted
    const providers = anime.embed_providers || {};
    // extract episode keys: numeric sort (e.g., "01", "1", "2", "3")
    let episodeKeys = Object.keys(providers).filter(key => {
      return providers[key] && typeof providers[key] === 'string' && providers[key].trim() !== '';
    });
    episodeKeys.sort((a,b) => {
      const numA = parseInt(a, 10);
      const numB = parseInt(b, 10);
      if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
      return a.localeCompare(b);
    });
    currentEpisodeMap = providers;
    currentEpisodesKeys = episodeKeys;
    // Build detail HTML
    const genresHtml = (anime.genres || []).map(g => `<span class="genre-tag">${escapeHtml(g)}</span>`).join('');
    const firstEpisodeKey = episodeKeys.length > 0 ? episodeKeys[0] : null;
    const embedSrc = firstEpisodeKey ? providers[firstEpisodeKey] : '';
    const playerHtml = `
      <div class="player-container" id="animePlayerContainer">
        ${embedSrc ? `<iframe id="videoIframe" src="${embedSrc}" allowfullscreen></iframe>` : `<div style="display: flex; align-items:center; justify-content:center; height:100%; background:#0a0a12;">⚠️ No embed links available. Add valid embed_providers in JSON.</div>`}
      </div>
    `;
    let episodesHtml = `<div class="episode-list"><span style="margin-right:10px;"><i class="fas fa-list"></i> Episodes:</span>`;
    if (episodeKeys.length === 0) {
      episodesHtml += `<span class="badge">No episodes embedded</span>`;
    } else {
      episodeKeys.forEach(key => {
        const activeClass = (firstEpisodeKey === key) ? 'active' : '';
        episodesHtml += `<button class="episode-btn ${activeClass}" data-ep="${key}">EP ${key}</button>`;
      });
    }
    episodesHtml += `</div>`;
    const detailHTML = `
      <div class="detail-backdrop">
        <div class="detail-poster">
          <img src="${anime.image || 'https://via.placeholder.com/300x420'}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/300x420?text=No+Cover'">
        </div>
        <div class="detail-info">
          <div class="detail-title">${escapeHtml(anime.title)}</div>
          ${anime.title_japanese ? `<div class="detail-jp">${escapeHtml(anime.title_japanese)}</div>` : ''}
          <div class="genres">${genresHtml}</div>
          <div><span class="badge">⭐ ${anime.score || 'N/A'}</span> <span class="badge">📺 ${anime.type || 'TV'}</span> <span class="badge">📅 ${anime.year || '—'}</span> <span class="badge">🎞️ ${anime.episodes || '?'} eps</span></div>
          <div class="synopsis"><strong>Synopsis:</strong><br>${escapeHtml(anime.synopsis || 'No synopsis provided.')}</div>
          <div><span class="badge">Status: ${anime.status || 'Unknown'}</span></div>
        </div>
      </div>
      ${playerHtml}
      ${episodesHtml}
    `;
    dynamicDetail.innerHTML = detailHTML;
    // after render, attach episode click events
    const episodeBtns = document.querySelectorAll('.episode-btn');
    episodeBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const epKey = btn.getAttribute('data-ep');
        if (epKey && currentEpisodeMap[epKey]) {
          const iframe = document.getElementById('videoIframe');
          if (iframe) {
            iframe.src = currentEpisodeMap[epKey];
          } else {
            // recreate iframe inside container
            const playerDiv = document.getElementById('animePlayerContainer');
            if (playerDiv) {
              playerDiv.innerHTML = `<iframe id="videoIframe" src="${currentEpisodeMap[epKey]}" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>`;
            }
          }
          // update active style
          episodeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        } else {
          alert('No embed URL for this episode');
        }
      });
    });
    // transition views
    homeSection.style.display = 'none';
    detailSection.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // update current embed active episode if any
    if (firstEpisodeKey && embedSrc) {
      const iframe = document.getElementById('videoIframe');
      if (iframe && iframe.src !== embedSrc) iframe.src = embedSrc;
    }
  }

  // reset to home with search optional
  function goHome() {
    homeSection.style.display = 'block';
    detailSection.style.display = 'none';
    currentAnimeId = null;
    renderHomeGrid(searchInput.value);
    renderFeatured();  // refresh featured in case
    window.scrollTo(0, 0);
  }

  // search event
  function setupEventListeners() {
    searchInput.addEventListener('input', (e) => {
      if (homeSection.style.display !== 'none') {
        renderHomeGrid(e.target.value);
      }
    });
    logoBtn.addEventListener('click', () => goHome());
    backHomeBtn.addEventListener('click', () => goHome());
    window.addEventListener('popstate', (e) => {
      // simple hash control but we handle only home on popstate for simplicity
      if (!location.hash) {
        if (detailSection.style.display === 'block') goHome();
      } else {
        // optional: if we want hash anime/detail we could parse but minimal
        const match = location.hash.match(/^#anime\/(.+)$/);
        if (match && match[1]) {
          const id = decodeURIComponent(match[1]);
          if (animeDatabase.find(a => a.id === id)) showAnimeDetail(id);
        } else if (detailSection.style.display === 'block') goHome();
      }
    });
    // basic hash routing after data loaded
  }

  function updateHashForAnime(animeId) {
    history.pushState(null, '', `#anime/${encodeURIComponent(animeId)}`);
  }

  // override showAnimeDetail to update history
  const originalShow = showAnimeDetail;
  window.showAnimeDetail = function(animeId) {
    originalShow(animeId);
    updateHashForAnime(animeId);
  };
  showAnimeDetail = function(animeId) {
    originalShow(animeId);
    updateHashForAnime(animeId);
  };

  // handle initial route if hash exists
  async function handleInitialRoute() {
    await fetchAnimeData();
    renderFeatured();
    renderHomeGrid('');
    setupEventListeners();
    if (window.location.hash && window.location.hash.startsWith('#anime/')) {
      const id = decodeURIComponent(window.location.hash.slice(7));
      const anime = animeDatabase.find(a => a.id === id);
      if (anime) {
        showAnimeDetail(id);
      } else {
        goHome();
      }
    } else {
      goHome();
    }
  }

  // override function references to match new showAnimeDetail
  window.originalShow = originalShow;
  // attach final init
  (function init() {
    handleInitialRoute().catch(err => {
      console.warn(err);
      if (animeGridContainer) animeGridContainer.innerHTML = `<div class="error-msg">⚠️ Could not load data/anime.json. Double-check file path: data/anime.json must exist.</div>`;
    });
  })();
</script>
</body>
</html>
