<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and Search Anime - NovaAnime">
    <meta property="og:title" content="Browse Anime - NovaAnime">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0b0b0f">
    <link rel="manifest" href="/manifest.json">
    <title>Browse Anime - NovaAnime</title>
    <style>
        :root {
            --bg: #0b0b0f;
            --bg2: #121218;
            --bg3: #1a1a24;
            --accent: #8b5cf6;
            --accent2: #d946ef;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --glass: rgba(18, 18, 24, 0.85);
            --glass-border: rgba(139, 92, 246, 0.2);
            --glow: 0 0 25px rgba(139, 92, 246, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        body::-webkit-scrollbar { width: 6px; }
        body::-webkit-scrollbar-track { background: var(--bg); }
        body::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 800;
            font-size: 1.5rem;
        }
        .nav-logo .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: var(--glow);
        }
        .nav-links { display: flex; gap: 0.5rem; list-style: none; }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .nav-links a:hover, .nav-links a.active { color: #fff; background: rgba(139,92,246,0.15); }

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        
        .search-bar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1.5px solid var(--glass-border);
            background: var(--bg2);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }
        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(139,92,246,0.2); }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .filter-btn {
            padding: 8px 18px;
            border-radius: 50px;
            border: 1.5px solid var(--glass-border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: #fff;
            background: rgba(139,92,246,0.1);
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
        }
        @media (max-width: 500px) {
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
        }
        .anime-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            backdrop-filter: blur(8px);
        }
        .anime-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(139,92,246,0.25);
        }
        .anime-card .poster-wrap {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }
        .anime-card .poster-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .anime-card:hover .poster-wrap img { transform: scale(1.08); }
        .anime-card .card-info { padding: 0.7rem; }
        .anime-card .card-info .card-title {
            font-weight: 600;
            font-size: 0.85rem;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .anime-card .card-info .card-meta { font-size: 0.7rem; color: var(--muted); }
        .anime-card .rating-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(139,92,246,0.85);
            backdrop-filter: blur(6px);
            padding: 3px 8px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
        }

        .load-more {
            text-align: center;
            margin-top: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 20px rgba(139,92,246,0.35);
        }
        .btn-primary:hover { box-shadow: 0 6px 30px rgba(217,70,239,0.55); transform: translateY(-2px); }

        .loading-text { text-align: center; padding: 2rem; color: var(--muted); }
        .no-results { text-align: center; padding: 3rem; color: var(--muted); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <span class="logo-icon">✦</span> NovaAnime
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html" class="active">Browse</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchQuery" placeholder="Search anime by title..." autocomplete="off">
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('', this)">All</button>
            <button class="filter-btn" onclick="setFilter('tv', this)">📺 TV</button>
            <button class="filter-btn" onclick="setFilter('movie', this)">🎬 Movie</button>
            <button class="filter-btn" onclick="setFilter('ova', this)">📀 OVA</button>
            <button class="filter-btn" onclick="setFilter('ona', this)">🌐 ONA</button>
            <button class="filter-btn" onclick="setFilter('special', this)">⭐ Special</button>
        </div>

        <div class="anime-grid" id="searchResults">
            <p class="loading-text">🔍 Search for anime or browse by type...</p>
        </div>
        
        <div class="load-more" id="loadMoreContainer" style="display:none;">
            <button class="btn btn-primary" onclick="loadMore()">Load More</button>
        </div>
    </div>

    <script>
        const JIKAN_BASE = 'https://api.jikan.moe/v4';
        let currentPage = 1;
        let currentQuery = '';
        let currentType = '';
        let hasMore = true;
        let isLoading = false;

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                q: params.get('q') || '',
                type: params.get('type') || ''
            };
        }

        function createAnimeCard(anime) {
            const title = anime.title_english || anime.title;
            const poster = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
            return `
                <a href="anime.html?id=${anime.mal_id}" class="anime-card">
                    <div class="poster-wrap">
                        <img src="${poster}" alt="${title}" loading="lazy" onerror="this.style.background='var(--bg3)'">
                        ${anime.score ? `<span class="rating-badge">⭐ ${anime.score}</span>` : ''}
                    </div>
                    <div class="card-info">
                        <div class="card-title">${title}</div>
                        <div class="card-meta">${anime.type || 'TV'} · ${anime.episodes || '?'} eps</div>
                    </div>
                </a>
            `;
        }

        async function searchAnime(query, type, page = 1, append = false) {
            if (isLoading) return;
            isLoading = true;
            
            try {
                let url = `${JIKAN_BASE}/anime?page=${page}&limit=24&order_by=popularity`;
                if (query) url += `&q=${encodeURIComponent(query)}`;
                if (type) url += `&type=${type}`;
                
                const res = await fetch(url);
                const json = await res.json();
                
                const grid = document.getElementById('searchResults');
                const loadMore = document.getElementById('loadMoreContainer');
                
                if (!append) {
                    grid.innerHTML = '';
                }
                
                if (json.data.length === 0 && !append) {
                    grid.innerHTML = '<div class="no-results">😔 No anime found. Try different keywords.</div>';
                    loadMore.style.display = 'none';
                    hasMore = false;
                    return;
                }
                
                grid.insertAdjacentHTML('beforeend', json.data.map(createAnimeCard).join(''));
                
                hasMore = json.pagination?.has_next_page || false;
                loadMore.style.display = hasMore ? 'block' : 'none';
                
            } catch (error) {
                console.error('Search error:', error);
                document.getElementById('searchResults').innerHTML = 
                    '<div class="no-results">Failed to load results. Please try again.</div>';
            } finally {
                isLoading = false;
            }
        }

        function loadMore() {
            currentPage++;
            searchAnime(currentQuery, currentType, currentPage, true);
        }

        function setFilter(type, btn) {
            currentType = type;
            currentPage = 1;
            hasMore = true;
            
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const query = document.getElementById('searchQuery').value.trim();
            currentQuery = query;
            searchAnime(query, type, 1, false);
            
            // Update URL
            const newUrl = new URL(window.location);
            if (type) newUrl.searchParams.set('type', type);
            else newUrl.searchParams.delete('type');
            if (query) newUrl.searchParams.set('q', query);
            else newUrl.searchParams.delete('q');
            window.history.replaceState({}, '', newUrl);
        }

        // Debounced search
        let searchTimeout;
        document.getElementById('searchQuery').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const query = this.value.trim();
            searchTimeout = setTimeout(() => {
                currentQuery = query;
                currentPage = 1;
                hasMore = true;
                searchAnime(query, currentType, 1, false);
                
                const newUrl = new URL(window.location);
                if (query) newUrl.searchParams.set('q', query);
                else newUrl.searchParams.delete('q');
                window.history.replaceState({}, '', newUrl);
            }, 500);
        });

        // Initialize from URL params
        document.addEventListener('DOMContentLoaded', () => {
            const params = getParams();
            if (params.q) {
                document.getElementById('searchQuery').value = params.q;
                currentQuery = params.q;
            }
            if (params.type) {
                currentType = params.type;
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active');
                    if (b.textContent.toLowerCase().includes(params.type)) b.classList.add('active');
                });
            }
            searchAnime(currentQuery, currentType, 1, false);
        });
    </script>
</body>
</html>
